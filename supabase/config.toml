project_id = "coparent-calendar"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false   # local convenience; enable in production

[storage]
enabled = true

[functions.notify]
# Reject calls without a valid Supabase JWT; the function additionally checks
# the caller is a member/admin of the referenced family.
verify_jwt = true
